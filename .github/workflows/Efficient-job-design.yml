# .github/workflows/deploy.yml
name: Multi-Environment Deployment

on:
  push:
    branches:
      - main
      - develop # Mandatory trigger so the staging deployment can run

jobs:
  # 1. Compilation/Build Phase
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Application
        run: echo "Compiling application binaries and preparing distribution artifacts..."

  # 2. Staging Deployment Phase
  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to Staging Environment
        run: echo "Deploying build artifacts to the Staging server..."

  # 3. Production Deployment Phase
  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to Production Environment
        run: echo "Deploying verified release artifacts to Production cluster..."
